<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated components</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>Learn CSS Animations Easily</p>
        <button class="animated-btn">Get Started</button>
    </section>

    <!-- Flip Card -->
    <div class="card-container">
        <div class="card">
            <div class="card-front">
                Front Side
            </div>
            <div class="card-back">
                Back Side
            </div>
        </div>
    </div>

</body>
</html>
